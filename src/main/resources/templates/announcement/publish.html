<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布公告 - 班级事务管理系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="container">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        <main class="main-content">
            <div class="page-header">
                <h2>发布公告</h2>
            </div>
            <form th:action="@{/announcement/publish}" method="post" class="form-container">
                <div class="form-group">
                    <label for="title">标题 *</label>
                    <input type="text" id="title" name="title" required>
                </div>
                <div class="form-group">
                    <label for="content">内容 *</label>
                    <textarea id="content" name="content" rows="10" required></textarea>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" name="isImportant" value="true"> 标记为重要公告
                    </label>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">发布</button>
                    <a th:href="@{/announcement/list}" class="btn btn-secondary">取消</a>
                </div>
            </form>
        </main>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
