<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件列表 - 班级事务管理系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="container">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        <main class="main-content">
            <div class="page-header">
                <h2>文件共享</h2>
                <div class="page-actions">
                    <a th:href="@{/file/upload}" class="btn btn-primary">上传文件</a>
                    <a th:href="@{/file/my}" class="btn btn-secondary">我的文件</a>
                </div>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>文件名</th>
                        <th>大小</th>
                        <th>上传者</th>
                        <th>上传时间</th>
                        <th>下载次数</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="file : ${files}">
                        <td>
                            <a th:href="@{/file/detail/{id}(id=${file.id})}" th:text="${file.originalName}">文件名</a>
                        </td>
                        <td th:text="${file.fileSize + ' 字节'}">大小</td>
                        <td th:text="${file.uploaderName}">上传者</td>
                        <td th:text="${#dates.format(file.uploadTime, 'yyyy-MM-dd HH:mm')}">时间</td>
                        <td th:text="${file.downloadCount}">次数</td>
                        <td>
                            <a th:href="@{/file/detail/{id}(id=${file.id})}" class="btn btn-primary btn-sm">查看</a>
                            <form th:if="${session.user.role.name() == 'TEACHER' or session.user.role.name() == 'COMMITTEE'}"
                                  th:action="@{/file/delete/{id}(id=${file.id})}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('确定删除吗？')">删除</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(files)}">
                        <td colspan="6" class="empty-state">暂无文件</td>
                    </tr>
                </tbody>
            </table>
        </main>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
