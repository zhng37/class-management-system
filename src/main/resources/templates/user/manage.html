<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 班级事务管理系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="container">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        <main class="main-content">
            <div class="page-header">
                <h2>用户管理</h2>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>真实姓名</th>
                        <th>角色</th>
                        <th>学号</th>
                        <th>手机号</th>
                        <th>邮箱</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}">ID</td>
                        <td th:text="${user.username}">用户名</td>
                        <td th:text="${user.realName}">姓名</td>
                        <td>
                            <span class="badge badge-success" th:text="${user.role.description}">角色</span>
                        </td>
                        <td th:text="${user.studentId != null ? user.studentId : ''}">学号</td>
                        <td th:text="${user.phone != null ? user.phone : ''}">手机</td>
                        <td th:text="${user.email != null ? user.email : ''}">邮箱</td>
                        <td>
                            <form th:action="@{/user/delete/{id}(id=${user.id})}" method="post" style="display:inline;">
                                <button type="submit" 
                                        class="btn btn-danger btn-sm" 
                                        th:disabled="${user.id == session.user.id}"
                                        onclick="return confirm('确定删除吗？')">删除</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="8" class="empty-state">暂无用户</td>
                    </tr>
                </tbody>
            </table>
        </main>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
