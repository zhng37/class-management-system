<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记录考勤 - 班级事务管理系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="container">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        <main class="main-content">
            <div class="page-header">
                <h2>记录考勤</h2>
                <a th:href="@{/attendance/date}" class="btn btn-secondary">按日期查看</a>
            </div>
            <form th:action="@{/attendance/record}" method="post" class="form-container">
                <div class="form-group">
                    <label for="userId">学生 *</label>
                    <select id="userId" name="userId" required>
                        <option value="">请选择学生</option>
                        <option th:each="student : ${students}" 
                                th:value="${student.id}" 
                                th:text="${student.realName + ' (' + student.username + ')'}">学生</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">日期 * (格式: yyyy-MM-dd)</label>
                    <input type="date" id="date" name="date" required>
                </div>
                <div class="form-group">
                    <label for="status">状态 *</label>
                    <select id="status" name="status" required>
                        <option value="PRESENT">出勤</option>
                        <option value="ABSENT">缺勤</option>
                        <option value="LATE">迟到</option>
                        <option value="LEAVE">请假</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="remark">备注</label>
                    <textarea id="remark" name="remark" rows="3"></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">提交</button>
                    <a th:href="@{/attendance/my}" class="btn btn-secondary">取消</a>
                </div>
            </form>
        </main>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
